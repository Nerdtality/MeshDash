# Dependents of this repository will be pulled through the CI
# when the PR is merged to validate that the change does not break
# downstream usage.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install linting tools
        run: pip install ruff flake8
      - name: Lint Python
        run: |
          ruff check . || true
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true

  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Python syntax check
        run: python -m py_compile $(find . -name "*.py" -not -path "./venv/*" -not -path "./.venv/*") 2>&1 || true